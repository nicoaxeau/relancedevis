/* ---------- Charte Ax'eau ---------- */
const NAVY = "#1D2E4D";
const BLUE = "#69ACDF";
const BLUE_DEEP = "#3E7CB1";

/* ---------- Helpers ---------- */
function parseMontant(v) {
  if (typeof v === "number") return isNaN(v) ? 0 : v;
  if (!v) return 0;
  let s = String(v).trim().replace(/[€\s\u00a0\u202f]/g, "").replace(/ttc|ht|htva/gi, "");
  if (s.includes(",") && s.includes(".")) s = s.replace(/\./g, "").replace(",", ".");
  else if (s.includes(",")) s = s.replace(",", ".");
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function parseDateValue(v) {
  if (v instanceof Date && !isNaN(v)) return v;
  if (typeof v === "number") {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return isNaN(d) ? null : d;
  }
  if (!v) return null;
  const s = String(v).trim();
  const m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if (m) {
    let y = m[3];
    if (y.length === 2) y = "20" + y;
    const dt = new Date(+y, +m[2] - 1, +m[1]);
    return isNaN(dt) ? null : dt;
  }
  const dt = new Date(s);
  return isNaN(dt) ? null : dt;
}
const euro = (n) =>
  (n || 0).toLocaleString("fr-FR", { maximumFractionDigits: 2 }) + " €";
const euroShort = (n) =>
  (n || 0).toLocaleString("fr-FR", { maximumFractionDigits: 2 }) + " €";
const pct = (n) =>
  (isFinite(n) ? n * 100 : 0).toLocaleString("fr-FR", { maximumFractionDigits: 2 }) + " %";
const pctShort = (n) =>
  (isFinite(n) ? n * 100 : 0).toLocaleString("fr-FR", { maximumFractionDigits: 2 }) + " %";

function guessCol(headers, sample, regex, needsAt) {
  const byName = headers.find((h) => regex.test(String(h)));
  if (byName) return byName;
  if (needsAt) {
    const h = headers.find((hh) => sample.some((r) => String(r[hh] || "").includes("@")));
    if (h) return h;
  }
  return "";
}
function guessMontantCol(headers, sample) {
  const ht = headers.find((h) => /\bh\.?t\.?\b|hors\s*tax/i.test(String(h)));
  if (ht) return ht;
  return guessCol(headers, sample, /montant|total|prix|ttc|^ca$|valeur/i, false);
}

async function copyText(text, fallbackRef, setFlag, setErr) {
  let ok = false;
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      ok = true;
    }
  } catch (e) {}
  if (!ok) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ok = document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) {}
  }
  if (ok) {
    setFlag(true);
    setErr("");
    setTimeout(() => setFlag(false), 2000);
  } else {
    if (fallbackRef && fallbackRef.current) {
      fallbackRef.current.focus();
      fallbackRef.current.select();
    }
    setErr("Copie bloquée par le navigateur — le texte est sélectionné, fais Ctrl/Cmd + C.");
  }
}

/* ---------- Découpage temporel ---------- */
const MOIS = ["janv.", "févr.", "mars", "avr.", "mai", "juin", "juil.", "août", "sept.", "oct.", "nov.", "déc."];
function dayStart(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function fmtJour(d) {
  return String(d.getDate()).padStart(2, "0") + "/" + String(d.getMonth() + 1).padStart(2, "0");
}

function buildBuckets(lines, gran) {
  const dated = lines.filter((l) => l.date);
  if (dated.length < 2) return { ok: false, reason: "nodate", spanDays: 0 };
  let min = dated[0].date, max = dated[0].date;
  for (const l of dated) {
    if (l.date < min) min = l.date;
    if (l.date > max) max = l.date;
  }
  const spanDays = Math.round((dayStart(max) - dayStart(min)) / 86400000) + 1;
  if (spanDays < 14) return { ok: false, reason: "short", spanDays: spanDays };

  const mode = (!gran || gran === "auto") ? (spanDays <= 60 ? "week" : "month") : gran;

  const keyOf = (d) => {
    if (mode === "month") return d.getFullYear() + "-" + d.getMonth();
    if (mode === "day") return dayStart(d).getTime();
    const diff = Math.floor((dayStart(d) - dayStart(min)) / 86400000);
    return "w" + Math.floor(diff / 7);
  };
  const labelOf = (d) => {
    if (mode === "month") return MOIS[d.getMonth()] + " " + String(d.getFullYear()).slice(2);
    if (mode === "day") return fmtJour(d);
    const diff = Math.floor((dayStart(d) - dayStart(min)) / 86400000);
    const start = new Date(dayStart(min).getTime() + Math.floor(diff / 7) * 7 * 86400000);
    return fmtJour(start);
  };
  const fullOf = (d) => {
    if (mode === "month") return "Mois de " + MOIS[d.getMonth()] + " " + d.getFullYear();
    if (mode === "day") return "Journée du " + fmtJour(d) + "/" + d.getFullYear();
    const diff = Math.floor((dayStart(d) - dayStart(min)) / 86400000);
    const start = new Date(dayStart(min).getTime() + Math.floor(diff / 7) * 7 * 86400000);
    const end = new Date(start.getTime() + 6 * 86400000);
    return "Semaine du " + fmtJour(start) + " au " + fmtJour(end);
  };

  const buckets = [];
  const index = new Map();
  for (const l of dated) {
    const k = keyOf(l.date);
    if (!index.has(k)) {
      const b = {
        key: k, label: labelOf(l.date), full: fullOf(l.date), sort: l.date.getTime(),
        nbDevis: 0, nbSigne: 0, nbAnnul: 0, nbMonetico: 0,
        valDevis: 0, valSigne: 0, valAnnul: 0, valMonetico: 0,
      };
      index.set(k, b);
      buckets.push(b);
    }
    const b = index.get(k);
    if (l.date.getTime() < b.sort) b.sort = l.date.getTime();
    b.nbDevis++;
    b.valDevis += l.montantHT;
    if (l.statut === "signe") {
      b.nbSigne++; b.valSigne += l.montantHT;
      if (l.monetico) { b.nbMonetico++; b.valMonetico += l.montantHT; }
    } else if (l.statut === "annule") {
      b.nbAnnul++; b.valAnnul += l.montantHT;
    }
  }
  buckets.sort((a, b) => a.sort - b.sort);
  return { ok: true, mode: mode, spanDays: spanDays, buckets: buckets, sansDate: lines.length - dated.length };
}

/* ---------- Graphique SVG avec infobulle ---------- */
function Chart({ buckets, series, fmt, height, extra }) {
  const [hi, setHi] = useState(null);
  const W = 720, H = height || 250;
  const padL = 104, padR = 16, padT = 16, padB = 42;
  const iw = W - padL - padR, ih = H - padT - padB;
  const n = buckets.length;

  let raw = 0;
  series.forEach((s) => s.values.forEach((v) => { if (v > raw) raw = v; }));
  if (raw <= 0) raw = 1;
  // borne haute arrondie pour que les graduations tombent sur des valeurs exactes
  const rough = (raw * 1.08) / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  const nice = norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 2.5 ? 2.5 : norm <= 5 ? 5 : 10;
  const max = nice * mag * 4;

  const X = (i) => padL + (n <= 1 ? iw / 2 : (iw * i) / (n - 1));
  const Y = (v) => padT + ih - (ih * v) / max;
  const ticks = [0, 0.25, 0.5, 0.75, 1];
  const step = n > 10 ? Math.ceil(n / 8) : 1;
  const bandW = n <= 1 ? iw : iw / (n - 1);

  const leftPct = hi != null ? (X(hi) / W) * 100 : 0;
  const anchor = leftPct > 72 ? "translateX(-96%)" : (leftPct < 22 ? "translateX(-4%)" : "translateX(-50%)");

  return (
    <div style={{ position: "relative" }}>
      <svg viewBox={"0 0 " + W + " " + H} style={{ width: "100%", height: "auto", display: "block" }}
        onMouseLeave={() => setHi(null)}>
        {ticks.map((t, i) => (
          <g key={i}>
            <line x1={padL} x2={W - padR} y1={Y(max * t)} y2={Y(max * t)} stroke={LINE} strokeWidth="1" />
            <text x={padL - 8} y={Y(max * t) + 4} textAnchor="end" fontSize="11" fill={INK}>{fmt(max * t)}</text>
          </g>
        ))}
        {buckets.map((b, i) => (
          i % step === 0 ? (
            <text key={i} x={X(i)} y={H - 22} textAnchor="middle" fontSize="11"
              fill={hi === i ? NAVY : INK} fontWeight={hi === i ? "700" : "400"}>{b.label}</text>
          ) : null
        ))}
        {hi != null && (
          <line x1={X(hi)} x2={X(hi)} y1={padT} y2={padT + ih} stroke={NAVY} strokeWidth="1" strokeDasharray="4 4" opacity="0.55" />
        )}
        {series.map((s, si) => (
          <g key={si}>
            <polyline
              fill="none" stroke={s.color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"
              points={s.values.map((v, i) => X(i) + "," + Y(v)).join(" ")}
            />
            {s.values.map((v, i) => (
              <circle key={i} cx={X(i)} cy={Y(v)} r={hi === i ? 5.5 : 3.5} fill="#fff" stroke={s.color} strokeWidth={hi === i ? 3 : 2} />
            ))}
          </g>
        ))}
        {buckets.map((b, i) => (
          <rect key={i} x={X(i) - bandW / 2} y={padT} width={bandW} height={ih}
            fill="transparent" style={{ cursor: "crosshair" }}
            onMouseEnter={() => setHi(i)} />
        ))}
      </svg>

      {hi != null && (
        <div style={{
          position: "absolute", left: leftPct + "%", top: 6, transform: anchor,
          background: "#fff", border: "1px solid " + LINE, borderRadius: 8,
          boxShadow: "0 4px 14px rgba(29,46,77,.14)", padding: "9px 12px",
          fontSize: 12, color: NAVY, pointerEvents: "none", whiteSpace: "nowrap", zIndex: 5,
        }}>
          <div style={{ fontWeight: 700, marginBottom: 5 }}>{buckets[hi].full}</div>
          {series.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 7, marginTop: 2 }}>
              <span style={{ width: 9, height: 9, borderRadius: 9, background: s.color, display: "inline-block", flexShrink: 0 }}></span>
              <span style={{ color: INK }}>{s.name}</span>
              <strong style={{ marginLeft: "auto", paddingLeft: 12 }}>{fmt(s.values[hi])}</strong>
            </div>
          ))}
          {extra && (
            <div style={{ marginTop: 6, paddingTop: 5, borderTop: "1px solid " + LINE, color: INK }}>
              {extra(buckets[hi])}
            </div>
          )}
        </div>
      )}

      <div style={{ display: "flex", flexWrap: "wrap", gap: 16, justifyContent: "center", marginTop: 4 }}>
        {series.map((s, i) => (
          <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: INK }}>
            <span style={{ width: 14, height: 3, background: s.color, borderRadius: 2, display: "inline-block" }}></span>
            {s.name}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ===================================================================== */
/* ONGLET 1 — IMPORT MAILJET                                             */
/* ===================================================================== */
function ImportTab() {
  const [rows, setRows] = useState([]);
  const [headers, setHeaders] = useState([]);
  const [emailCol, setEmailCol] = useState("");
  const [fileName, setFileName] = useState("");
  const [error, setError] = useState("");
  const [copied, setCopied] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const outRef = useRef(null);

  const parse = useCallback((data, name) => {
    try {
      const wb = XLSX.read(data, { type: "array", cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { defval: "" });
      if (!json.length) { setError("Fichier vide ou sans en-têtes."); return; }
      const hdrs = Object.keys(json[0]);
      setHeaders(hdrs); setRows(json);
      setEmailCol(guessCol(hdrs, json.slice(0, 20), /e-?mail|courriel|adresse/i, true));
      setFileName(name); setError(""); setCopied(false);
    } catch (e) { setError("Lecture impossible. Formats : .xlsx, .xls, .csv"); }
  }, []);

  const onFile = useCallback((file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => parse(e.target.result, file.name);
    r.onerror = () => setError("Erreur de lecture du fichier.");
    r.readAsArrayBuffer(file);
  }, [parse]);

  const validEmails = useMemo(() => {
    if (!emailCol) return [];
    const seen = new Set(); const out = [];
    for (const r of rows) {
      const m = String(r[emailCol] || "").trim().toLowerCase();
      if (!m || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(m) || seen.has(m)) continue;
      seen.add(m); out.push(m);
    }
    return out;
  }, [rows, emailCol]);

  const block = useMemo(() => {
    if (!validEmails.length) return "";
    return ["email;statut;mail_perso"].concat(validEmails.map((m) => m + ";en cours;" + m)).join("\n");
  }, [validEmails]);

  const reset = () => { setRows([]); setHeaders([]); setEmailCol(""); setFileName(""); setError(""); setCopied(false); };

  return (
    <div>
      <Intro
        title="Préparer un import"
        text="Dépose l'export Vision des devis envoyés. L'outil isole les emails et génère le bloc à coller dans Mailjet, avec les champs email, statut (réglé sur « en cours ») et mail_perso."
      />
      {!rows.length && <Drop dragOver={dragOver} setDragOver={setDragOver} onFile={onFile} />}
      {error && <ErrorBox>{error}</ErrorBox>}

      {rows.length > 0 && (
        <div>
          <FileBar name={fileName} count={rows.length} onReset={reset} />
          <Card>
            <Lbl>Colonne contenant l'adresse email</Lbl>
            <Select value={emailCol} onChange={setEmailCol} options={headers} />
            <Hint>Détectée automatiquement, modifiable si besoin.</Hint>
          </Card>
          <div style={{ display: "flex", gap: 12, margin: "16px 0" }}>
            <Stat label="Emails valides" value={validEmails.length} accent={BLUE_DEEP} />
            <Stat label="Lignes ignorées" value={rows.length - validEmails.length} accent={AMBER} hint="vides, invalides ou en double" />
          </div>
          {block ? (
            <Card>
              <Row>
                <span style={{ fontSize: 13, fontWeight: 700 }}>À coller dans Mailjet</span>
                <CopyBtn done={copied} onClick={() => copyText(block, outRef, setCopied, setError)} />
              </Row>
              <textarea ref={outRef} readOnly value={block} onFocus={(e) => e.target.select()} style={taStyle} />
              <Hint>
                Mailjet : liste « Relance devis » → Mettre à jour → colle ce bloc → à l'étape
                « Faire correspondre les propriétés », vérifie que statut et mail_perso sont bien associés.
              </Hint>
            </Card>
          ) : (
            <Card><span style={{ color: RED, fontSize: 13 }}>Aucun email valide dans « {emailCol} ». Vérifie la colonne sélectionnée.</span></Card>
          )}
        </div>
      )}
    </div>
  );
}

/* ===================================================================== */
/* ONGLET 2 — ANALYSE KPIs                                               */
/* ===================================================================== */
function KpiTab() {
  const [devis, setDevis] = useState(null);
  const [cmd, setCmd] = useState(null);
  const [annul, setAnnul] = useState(null);
  const [mone, setMone] = useState(null);
  const [gran, setGran] = useState("auto");
  const [error, setError] = useState("");
  const [copiedT, setCopiedT] = useState(false);
  const [copiedA, setCopiedA] = useState(false);
  const tblRef = useRef(null);
  const anaRef = useRef(null);

  const loadFile = (file, setter) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array", cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { defval: "" });
        if (!json.length) { setError("Un des fichiers est vide."); return; }
        const headers = Object.keys(json[0]);
        const sample = json.slice(0, 20);
        const map = {
          nom: guessCol(headers, sample, /nom|client|raison|soci/i, false),
          email: guessCol(headers, sample, /e-?mail|courriel|adresse/i, true),
          date: guessCol(headers, sample, /date|envoi|sign|command|annul|soumis|paie|transac/i, false),
          montant: guessMontantCol(headers, sample),
        };
        setter({ rows: json, headers: headers, name: file.name, map: map });
        setError("");
      } catch (err) { setError("Lecture impossible. Formats : .xlsx, .xls, .csv"); }
    };
    r.readAsArrayBuffer(file);
  };

  const setMap = (which, field, value) => {
    const objs = { devis: devis, cmd: cmd, annul: annul, mone: mone };
    const setters = { devis: setDevis, cmd: setCmd, annul: setAnnul, mone: setMone };
    const obj = objs[which], setter = setters[which];
    const newMap = Object.assign({}, obj.map);
    newMap[field] = value;
    setter(Object.assign({}, obj, { map: newMap }));
  };

  /* Source de vérité = fichier 1 (devis envoyés). La colonne Montant HT du
     devis donne TOUTES les valeurs. Les fichiers 2, 3 et 4 ne servent qu'à
     attribuer statut et mode de paiement via l'email. Sans devis = ignoré. */
  const result = useMemo(() => {
    if (!devis || !cmd) return null;
    const dm = devis.map, cm = cmd.map;
    if (!dm.email || !dm.montant || !cm.email) return null;

    const hasAnnul = !!(annul && annul.map.email);
    const hasMone = !!(mone && mone.map.email);
    const am = annul ? annul.map : null;
    const mm = mone ? mone.map : null;

    const indexer = (src, map) => {
      const idx = new Map();
      for (const r of src.rows) {
        const mail = String(r[map.email] || "").trim().toLowerCase();
        if (!mail) continue;
        const date = map.date ? parseDateValue(r[map.date]) : null;
        if (!idx.has(mail)) idx.set(mail, { date: null });
        const e = idx.get(mail);
        if (date && (!e.date || date < e.date)) e.date = date;
      }
      return idx;
    };

    const cmdByEmail = indexer(cmd, cm);
    const annulByEmail = hasAnnul ? indexer(annul, am) : new Map();
    const moneByEmail = hasMone ? indexer(mone, mm) : new Map();

    const lines = [];
    let valDevis = 0, valTransfo = 0, nbTransfo = 0;
    let nbAnnul = 0, valAnnul = 0;
    let nbMonetico = 0, valMonetico = 0;
    const delais = [], delaisAnnul = [], delaisPaie = [];
    const seenDevis = new Set();
    let orphelinsBdc = 0, orphelinsMone = 0;

    for (const r of devis.rows) {
      const mail = String(r[dm.email] || "").trim().toLowerCase();
      if (!mail) continue;
      const montantHT = parseMontant(r[dm.montant]);
      const dateDevis = dm.date ? parseDateValue(r[dm.date]) : null;
      const nom = dm.nom ? r[dm.nom] : "";
      seenDevis.add(mail);
      valDevis += montantHT;

      const mCmd = cmdByEmail.get(mail);
      const mAnnul = hasAnnul ? annulByEmail.get(mail) : null;
      const mMone = hasMone ? moneByEmail.get(mail) : null;

      let statut = "attente", delai = null, paye = false;

      // un paiement Monetico vaut acceptation : le devis est signé
      if (mCmd || mMone) {
        statut = "signe"; nbTransfo++; valTransfo += montantHT;
        const dSign = mCmd ? mCmd.date : null;
        if (dateDevis && dSign) {
          const d = Math.round((dSign - dateDevis) / 86400000);
          if (d >= 0) { delai = d; delais.push(d); }
        }
        if (mMone) {
          paye = true; nbMonetico++; valMonetico += montantHT;
          if (dateDevis && mMone.date) {
            const d = Math.round((mMone.date - dateDevis) / 86400000);
            if (d >= 0) {
              delaisPaie.push(d);
              if (delai == null) delai = d;
            }
          }
        }
      } else if (mAnnul) {
        statut = "annule"; nbAnnul++; valAnnul += montantHT;
        if (dateDevis && mAnnul.date) {
          const d = Math.round((mAnnul.date - dateDevis) / 86400000);
          if (d >= 0) { delai = d; delaisAnnul.push(d); }
        }
      }
      lines.push({ nom: nom, mail: mail, montantHT: montantHT, statut: statut, delai: delai, monetico: paye, date: dateDevis });
    }

    cmdByEmail.forEach((v, mail) => { if (!seenDevis.has(mail)) orphelinsBdc++; });
    moneByEmail.forEach((v, mail) => { if (!seenDevis.has(mail)) orphelinsMone++; });

    const nbDevis = lines.length;
    const ca = valTransfo;
    const nbAttente = nbDevis - nbTransfo - nbAnnul;
    const valAttente = valDevis - valTransfo - valAnnul;
    const nbDecides = nbTransfo + nbAnnul;
    const valDecides = valTransfo + valAnnul;

    const moy = (a) => a.length ? Math.round(a.reduce((x, y) => x + y, 0) / a.length) : null;

    return {
      lines: lines, hasAnnul: hasAnnul, hasMone: hasMone,
      orphelinsBdc: orphelinsBdc, orphelinsMone: orphelinsMone,
      nbDevis: nbDevis, valDevis: valDevis,
      nbTransfo: nbTransfo, valTransfo: valTransfo, ca: ca,
      delaiMoy: moy(delais), nbDelais: delais.length,
      nbAnnul: nbAnnul, valAnnul: valAnnul, delaiAnnulMoy: moy(delaisAnnul),
      nbMonetico: nbMonetico, valMonetico: valMonetico, delaiPaieMoy: moy(delaisPaie),
      partMone: nbTransfo ? nbMonetico / nbTransfo : 0,
      partMoneVal: valTransfo ? valMonetico / valTransfo : 0,
      nbAttente: nbAttente, valAttente: valAttente,
      nbDecides: nbDecides, valDecides: valDecides,
      tauxNb: nbDevis ? nbTransfo / nbDevis : 0,
      tauxVal: valDevis ? valTransfo / valDevis : 0,
      tauxAnnul: nbDevis ? nbAnnul / nbDevis : 0,
      tauxAnnulVal: valDevis ? valAnnul / valDevis : 0,
      tauxAffine: nbDecides ? nbTransfo / nbDecides : 0,
      tauxAffineVal: valDecides ? valTransfo / valDecides : 0,
    };
  }, [devis, cmd, annul, mone]);

  const graph = useMemo(() => result ? buildBuckets(result.lines, gran) : null, [result, gran]);

  const tableTSV = useMemo(() => {
    if (!result) return "";
    const statutLbl = { signe: "Accepté", annule: "Annulé", attente: "En attente" };
    const head = ["Client", "Email", "Montant HT", "Statut", "Paiement CB", "Délai (j)"].join("\t");
    const body = result.lines.map((l) =>
      [l.nom, l.mail, l.montantHT.toFixed(2).replace(".", ","), statutLbl[l.statut], l.monetico ? "Monetico" : "", l.delai != null ? l.delai : ""].join("\t")
    );
    return [head].concat(body).join("\n");
  }, [result]);

  const analyse = useMemo(() => {
    if (!result) return "";
    const r = result;
    let txt =
      "Sur la période analysée, " + r.nbDevis + " devis ont été envoyés pour une valeur totale de " + euro(r.valDevis) + " HT. " +
      r.nbTransfo + " ont été acceptés, soit un taux de transformation de " + pct(r.tauxNb) + " en volume et " + pct(r.tauxVal) + " en valeur, " +
      "pour un chiffre d'affaires de " + euro(r.ca) + " HT.";

    if (r.delaiMoy != null)
      txt += " Le délai moyen entre l'envoi et la signature est de " + r.delaiMoy + " jour" + (r.delaiMoy > 1 ? "s" : "") + ".";

    if (r.hasAnnul) {
      txt += " " + r.nbAnnul + " devis ont été annulés via le formulaire, soit un taux d'annulation de " + pct(r.tauxAnnul) + " en volume (" + euro(r.valAnnul) + " HT de devis perdus).";
      if (r.delaiAnnulMoy != null)
        txt += " Le délai moyen avant annulation est de " + r.delaiAnnulMoy + " jour" + (r.delaiAnnulMoy > 1 ? "s" : "") + ".";
      txt += " En écartant les " + r.nbAttente + " devis encore en attente, le taux de transformation sur devis tranchés s'établit à " + pct(r.tauxAffine) + " en volume et " + pct(r.tauxAffineVal) + " en valeur.";
    }

    if (r.hasMone) {
      txt += " Côté encaissement, " + r.nbMonetico + " devis ont été réglés par carte via Monetico, soit " + pct(r.partMone) + " des devis acceptés en volume et " + pct(r.partMoneVal) + " en valeur (" + euro(r.valMonetico) + " HT).";
      if (r.delaiPaieMoy != null)
        txt += " Le délai moyen entre l'envoi du devis et le paiement en ligne est de " + r.delaiPaieMoy + " jour" + (r.delaiPaieMoy > 1 ? "s" : "") + ".";
    }

    let qualite;
    const ref = r.hasAnnul ? r.tauxAffine : r.tauxNb;
    if (ref >= 0.5) qualite = " C'est un très bon niveau de transformation.";
    else if (ref >= 0.35) qualite = " Le niveau de transformation est conforme à la moyenne observée sur la période.";
    else qualite = " Le niveau de transformation reste perfectible et mérite d'analyser les motifs de non-signature.";
    return txt + qualite;
  }, [result]);

  const ready = devis && cmd;

  return (
    <div>
      <Intro
        title="Analyser la performance"
        text="Dépose les exports sur une même période : les devis envoyés (Vision), les bons de commande (Vision), les annulations (Gravity Forms) et les paiements CB (Monetico). Tous les montants proviennent de la colonne Montant HT des devis ; les autres fichiers ne servent qu'à déterminer statut et mode de règlement via l'email. Seuls les devis envoyés comptent dans le reporting."
      />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(210px, 1fr))", gap: 14, marginBottom: 4 }}>
        <FileSlot title="1 · Devis envoyés" subtitle="Vision — Montant HT (référence)" dateLabel="Date d'envoi" montantLabel="Montant Hors-Taxe" data={devis}
          onFile={(f) => loadFile(f, setDevis)} onReset={() => setDevis(null)} onMap={(field, v) => setMap("devis", field, v)} />
        <FileSlot title="2 · Bons de commande" subtitle="Vision — email + date" dateLabel="Date de signature" showMontant={false} data={cmd}
          onFile={(f) => loadFile(f, setCmd)} onReset={() => setCmd(null)} onMap={(field, v) => setMap("cmd", field, v)} />
        <FileSlot title="3 · Annulations" subtitle="optionnel — Gravity Forms" dateLabel="Date d'annulation" showMontant={false} optional data={annul}
          onFile={(f) => loadFile(f, setAnnul)} onReset={() => setAnnul(null)} onMap={(field, v) => setMap("annul", field, v)} />
        <FileSlot title="4 · Paiements Monetico" subtitle="optionnel — règlements CB" dateLabel="Date de paiement" showMontant={false} optional data={mone}
          onFile={(f) => loadFile(f, setMone)} onReset={() => setMone(null)} onMap={(field, v) => setMap("mone", field, v)} />
      </div>

      {error && <ErrorBox>{error}</ErrorBox>}

      {ready && !result && (
        <ErrorBox>Sélectionne au minimum la colonne <b>email</b> et la colonne <b>Montant HT</b> dans le fichier Devis, et la colonne <b>email</b> dans le fichier Bons de commande.</ErrorBox>
      )}

      {result && (
        <div style={{ marginTop: 18 }}>
          {/* KPIs principaux */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
            <KpiCard label="Devis envoyés" main={String(result.nbDevis)} sub={euro(result.valDevis) + " HT"} accent={NAVY} />
            <KpiCard label="Devis acceptés" main={String(result.nbTransfo)} sub={euro(result.valTransfo) + " HT"} accent={GREEN} />
            <KpiCard label="Taux de transfo." main={pct(result.tauxNb)} sub={pct(result.tauxVal) + " en valeur"} accent={BLUE_DEEP} />
            <KpiCard label="CA généré (HT)" main={euro(result.ca)} sub="= devis acceptés" accent={GREEN} />
          </div>

          {/* Volet annulation */}
          {result.hasAnnul && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginTop: 12 }}>
              <KpiCard label="Devis annulés" main={String(result.nbAnnul)} sub={euro(result.valAnnul) + " HT"} accent={RED} />
              <KpiCard label="Taux d'annulation" main={pct(result.tauxAnnul)} sub={pct(result.tauxAnnulVal) + " en valeur"} accent={RED} />
              <KpiCard label="En attente" main={String(result.nbAttente)} sub={euro(result.valAttente) + " HT"} accent={INK} />
              <KpiCard label="Devis avec décision" main={String(result.nbDecides)} sub={euro(result.valDecides) + " HT"} accent={NAVY} />
              <KpiCard label="Transfo. sur devis avec décision" main={pct(result.tauxAffine)} sub={pct(result.tauxAffineVal) + " en valeur"} accent={BLUE_DEEP} />
            </div>
          )}

          {/* Volet Monetico */}
          {result.hasMone && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginTop: 12 }}>
              <KpiCard label="Réglé via Monetico" main={String(result.nbMonetico)} sub={euro(result.valMonetico) + " HT"} accent={PURPLE} />
              <KpiCard label="Part Monetico" main={pct(result.partMone)} sub="des devis acceptés" accent={PURPLE} />
              <KpiCard label="Part Monetico (valeur)" main={pct(result.partMoneVal)} sub="du CA généré" accent={PURPLE} />
            </div>
          )}

          {/* Barre de répartition */}
          <Card style={{ marginTop: 14 }}>
            <Lbl>Répartition des devis (en volume)</Lbl>
            <div style={{ display: "flex", height: 26, borderRadius: 6, overflow: "hidden", border: "1px solid " + LINE, marginTop: 6 }}>
              {result.nbTransfo > 0 && (
                <Seg w={result.nbTransfo / result.nbDevis} bg={GREEN} fg="#fff" label={result.nbTransfo + " acceptés"} />
              )}
              {result.hasAnnul && result.nbAnnul > 0 && (
                <Seg w={result.nbAnnul / result.nbDevis} bg={RED} fg="#fff" label={result.nbAnnul + " annulés"} />
              )}
              {result.nbAttente > 0 && (
                <Seg w={result.nbAttente / result.nbDevis} bg="#eef2f8" fg={INK} label={result.nbAttente + " en attente"} />
              )}
            </div>
          </Card>

          {/* Graphiques d'évolution */}
          <Card style={{ marginTop: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700 }}>Évolution dans le temps</span>
              <Segmented
                value={gran}
                onChange={setGran}
                options={[["auto", "Auto"], ["day", "Jour"], ["week", "Semaine"], ["month", "Mois"]]}
              />
            </div>
            {graph && graph.ok ? (
              <div>
                <p style={{ fontSize: 12, color: INK, margin: "0 0 12px" }}>
                  Découpage {graph.mode === "day" ? "journalier" : graph.mode === "week" ? "hebdomadaire" : "mensuel"} sur {graph.spanDays} jours
                  {gran === "auto" ? " (sélection automatique)" : ""}, d'après la date d'envoi des devis. Survole une courbe pour lire les valeurs.
                </p>
                <div style={{ fontSize: 12.5, fontWeight: 700, color: NAVY, margin: "6px 0" }}>Taux (%)</div>
                <Chart
                  buckets={graph.buckets}
                  fmt={pctShort}
                  extra={(b) => b.nbDevis + " devis envoyé" + (b.nbDevis > 1 ? "s" : "") + " sur la période"}
                  series={[
                    { name: "Taux de transformation", color: GREEN, values: graph.buckets.map((b) => b.nbDevis ? b.nbSigne / b.nbDevis : 0) },
                  ].concat(result.hasAnnul ? [
                    { name: "Taux d'annulation", color: RED, values: graph.buckets.map((b) => b.nbDevis ? b.nbAnnul / b.nbDevis : 0) }
                  ] : []).concat(result.hasMone ? [
                    { name: "Part Monetico (sur acceptés)", color: PURPLE, values: graph.buckets.map((b) => b.nbSigne ? b.nbMonetico / b.nbSigne : 0) }
                  ] : [])}
                />
                <div style={{ fontSize: 12.5, fontWeight: 700, color: NAVY, margin: "18px 0 6px" }}>Volumes financiers (HT)</div>
                <Chart
                  buckets={graph.buckets}
                  fmt={euroShort}
                  extra={(b) => b.nbSigne + " accepté" + (b.nbSigne > 1 ? "s" : "") + " sur " + b.nbDevis + " devis"}
                  series={[
                    { name: "Valeur devis envoyés", color: BLUE_DEEP, values: graph.buckets.map((b) => b.valDevis) },
                    { name: "CA généré", color: GREEN, values: graph.buckets.map((b) => b.valSigne) },
                  ].concat(result.hasMone ? [
                    { name: "Encaissé via Monetico", color: PURPLE, values: graph.buckets.map((b) => b.valMonetico) }
                  ] : [])}
                />
                {graph.sansDate > 0 && (
                  <p style={{ fontSize: 11.5, color: "#94a0b5", marginTop: 12 }}>
                    {graph.sansDate} devis sans date d'envoi exploitable ne figurent pas dans les courbes.
                  </p>
                )}
              </div>
            ) : (
              <div style={{ padding: "22px 16px", borderRadius: 8, background: "#f7fafd", border: "1px dashed #cdd6e4", textAlign: "center", color: INK, fontSize: 13, lineHeight: 1.6 }}>
                {graph && graph.reason === "nodate"
                  ? "Pour afficher les courbes, sélectionne la colonne « Date d'envoi » dans le fichier des devis envoyés."
                  : "Pour des données graphiques, merci de présenter des données sur au moins 14 jours (période actuelle : " + (graph ? graph.spanDays : 0) + " jour" + (graph && graph.spanDays > 1 ? "s" : "") + ")."}
              </div>
            )}
          </Card>

          {/* Contrôles orphelins */}
          {(result.orphelinsBdc > 0 || result.orphelinsMone > 0) && (
            <div style={{ marginTop: 12, padding: "10px 14px", borderRadius: 8, background: "#fff7ea", color: "#8a6516", fontSize: 12.5, border: "1px solid #f0e0c0", lineHeight: 1.6 }}>
              {result.orphelinsBdc > 0 && (<div>{result.orphelinsBdc} bon(s) de commande sans devis correspondant : exclus du reporting.</div>)}
              {result.orphelinsMone > 0 && (<div>{result.orphelinsMone} paiement(s) Monetico sans devis correspondant : exclus du reporting.</div>)}
            </div>
          )}

          {/* Analyse texte */}
          <Card style={{ marginTop: 14 }}>
            <Row>
              <span style={{ fontSize: 13, fontWeight: 700 }}>Analyse</span>
              <CopyBtn done={copiedA} onClick={() => copyText(analyse, anaRef, setCopiedA, setError)} />
            </Row>
            <textarea ref={anaRef} readOnly value={analyse} onFocus={(e) => e.target.select()}
              style={Object.assign({}, taStyle, { minHeight: 150, fontFamily: "inherit", fontSize: 14, lineHeight: 1.55 })} />
          </Card>

          {/* Tableau détaillé */}
          <Card style={{ marginTop: 14 }}>
            <Row>
              <span style={{ fontSize: 13, fontWeight: 700 }}>Détail par devis</span>
              <CopyBtn done={copiedT} label="Copier le tableau" onClick={() => copyText(tableTSV, tblRef, setCopiedT, setError)} />
            </Row>
            <div style={{ overflowX: "auto", border: "1px solid " + LINE, borderRadius: 8 }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "#f3f7fc" }}>
                    {["Client", "Email", "Montant HT", "Statut", "Paiement", "Délai"].map((h) => (
                      <th key={h} style={th}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {result.lines.map((l, i) => (
                    <tr key={i} style={{ borderTop: "1px solid " + LINE }}>
                      <td style={td}>{l.nom || "—"}</td>
                      <td style={Object.assign({}, td, { color: INK })}>{l.mail}</td>
                      <td style={Object.assign({}, td, { textAlign: "right" })}>{euro(l.montantHT)}</td>
                      <td style={td}><StatutBadge statut={l.statut} /></td>
                      <td style={td}>
                        {l.monetico
                          ? <span style={{ fontSize: 12, fontWeight: 700, color: PURPLE, background: "#f1ecf8", padding: "2px 8px", borderRadius: 20 }}>Monetico</span>
                          : <span style={{ color: "#b9c2d2" }}>—</span>}
                      </td>
                      <td style={Object.assign({}, td, { textAlign: "right" })}>{l.delai != null ? l.delai + " j" : "—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <textarea ref={tblRef} readOnly value={tableTSV} style={{ position: "absolute", left: -9999, top: -9999, width: 1, height: 1 }} />
            <Hint>Le tableau se colle directement dans Excel (colonnes séparées par tabulation).</Hint>
          </Card>

          <p style={{ fontSize: 11.5, color: "#94a0b5", marginTop: 14, lineHeight: 1.5 }}>
            Source de vérité : le fichier des devis envoyés. La colonne Montant HT du devis donne la valeur du devis, de la commande, de l'annulation et du paiement.
            Statut par email : présent dans les bons de commande ou dans les paiements Monetico → accepté ; sinon présent dans les annulations → annulé ; sinon en attente.
            Un enregistrement sans devis envoyé correspondant est ignoré. Le taux affiné exclut les devis en attente (acceptés ÷ devis tranchés).
          </p>
        </div>
      )}
    </div>
  );
}

/* ---------- Sélecteur segmenté ---------- */
function Segmented({ value, onChange, options }) {
  return (
    <div style={{ display: "inline-flex", border: "1px solid #cdd6e4", borderRadius: 8, overflow: "hidden", background: "#fff" }}>
      {options.map((o, i) => (
        <button key={o[0]} onClick={() => onChange(o[0])}
          style={{
            border: "none", cursor: "pointer", fontSize: 12.5, fontWeight: 700,
            padding: "7px 14px",
            borderLeft: i === 0 ? "none" : "1px solid #e6ecf4",
            background: value === o[0] ? BLUE : "transparent",
            color: value === o[0] ? "#fff" : INK,
          }}>
          {o[1]}
        </button>
      ))}
    </div>
  );
}

function Seg({ w, bg, fg, label }) {
  return (
    <div style={{ width: Math.max(w * 100, 0) + "%", background: bg, color: fg, fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", minWidth: 44, whiteSpace: "nowrap", overflow: "hidden" }}>
      {label}
    </div>
  );
}
function StatutBadge({ statut }) {
  const all = {
    signe: { txt: "Accepté", c: GREEN, bg: "#e7f5ed" },
    annule: { txt: "Annulé", c: RED, bg: "#fdecee" },
    attente: { txt: "En attente", c: INK, bg: "#eef2f8" },
  };
  const cfg = all[statut];
  return <span style={{ fontSize: 12, fontWeight: 700, color: cfg.c, background: cfg.bg, padding: "2px 8px", borderRadius: 20 }}>{cfg.txt}</span>;
}

function FileSlot({ title, subtitle, dateLabel, montantLabel, showMontant, optional, data, onFile, onReset, onMap }) {
  const [dragOver, setDragOver] = useState(false);
  const withMontant = showMontant !== false;
  let fields = [
    ["nom", "Client / nom"],
    ["email", "Email"],
    ["date", dateLabel || "Date"],
  ];
  if (withMontant) fields.push(["montant", montantLabel || "Montant"]);
  const boxStyle = Object.assign({}, cardStyle, { padding: 14 }, optional ? { borderStyle: "dashed" } : {});
  return (
    <div style={boxStyle}>
      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 2 }}>{title}</div>
      <div style={{ fontSize: 12, color: INK, marginBottom: 10 }}>{subtitle}</div>
      {!data ? (
        <label
          onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={(e) => { e.preventDefault(); setDragOver(false); onFile(e.dataTransfer.files[0]); }}
          style={{ display: "block", border: "2px dashed " + (dragOver ? BLUE : "#cdd6e4"), borderRadius: 10, background: dragOver ? "#eef6fc" : "#fafbfd", padding: "26px 12px", textAlign: "center", cursor: "pointer" }}
        >
          <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={(e) => onFile(e.target.files[0])} />
          <div style={{ fontSize: 13, fontWeight: 600 }}>Déposer le fichier</div>
          <div style={{ fontSize: 11.5, color: INK, marginTop: 3 }}>.xlsx, .xls, .csv</div>
        </label>
      ) : (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 12, color: INK, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 130 }}>
              {data.name} · {data.rows.length} l.
            </span>
            <button onClick={onReset} style={Object.assign({}, ghostBtn, { padding: "4px 9px", fontSize: 11 })}>Changer</button>
          </div>
          {fields.map((f) => (
            <div key={f[0]} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 11.5, color: INK, marginBottom: 3 }}>{f[1]}</div>
              <Select value={data.map[f[0]]} onChange={(v) => onMap(f[0], v)} options={[""].concat(data.headers)} small />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Intro({ title, text }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <h2 style={{ fontSize: 20, margin: "0 0 6px" }}>{title}</h2>
      <p style={{ fontSize: 14, lineHeight: 1.55, margin: 0, color: INK }}>{text}</p>
    </div>
  );
}
function Drop({ dragOver, setDragOver, onFile }) {
  return (
    <label
      onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={(e) => { e.preventDefault(); setDragOver(false); onFile(e.dataTransfer.files[0]); }}
      style={{ display: "block", border: "2px dashed " + (dragOver ? BLUE : "#cdd6e4"), borderRadius: 12, background: dragOver ? "#eef6fc" : "#fafbfd", padding: "44px 24px", textAlign: "center", cursor: "pointer" }}
    >
      <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={(e) => onFile(e.target.files[0])} />
      <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>Glisse ton fichier ici</div>
      <div style={{ fontSize: 13, color: INK }}>ou clique pour le sélectionner — .xlsx, .xls, .csv</div>
    </label>
  );
}
function FileBar({ name, count, onReset }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
      <div style={{ fontSize: 13, color: INK }}>Fichier : <strong style={{ color: NAVY }}>{name}</strong> — {count} ligne{count > 1 ? "s" : ""}</div>
      <button onClick={onReset} style={ghostBtn}>Charger un autre fichier</button>
    </div>
  );
}
function Card({ children, style }) { return <div style={Object.assign({}, cardStyle, style)}>{children}</div>; }
function Row({ children }) { return <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>{children}</div>; }
function Lbl({ children }) { return <label style={{ display: "block", fontSize: 13, fontWeight: 700, marginBottom: 8 }}>{children}</label>; }
function Hint({ children }) { return <p style={{ fontSize: 12, color: INK, margin: "10px 0 0", lineHeight: 1.6 }}>{children}</p>; }
function ErrorBox({ children }) { return <div style={{ marginTop: 14, padding: "12px 14px", borderRadius: 8, background: "#fdeced", color: "#a8323a", fontSize: 13 }}>{children}</div>; }
function Select({ value, onChange, options, small }) {
  return (
    <select value={value} onChange={(e) => onChange(e.target.value)}
      style={{ width: "100%", fontSize: small ? 13 : 14, padding: small ? "7px 9px" : "9px 10px", borderRadius: 8, border: "1px solid #cdd6e4", background: "#fff", color: NAVY, boxSizing: "border-box" }}>
      {options.map((h) => <option key={h} value={h}>{h === "" ? "— (aucune)" : h}</option>)}
    </select>
  );
}
function Stat({ label, value, accent, hint }) {
  return (
    <div style={Object.assign({ flex: 1 }, cardStyle, { padding: "12px 14px" })}>
      <div style={{ fontSize: 26, fontWeight: 800, color: accent, fontVariantNumeric: "tabular-nums" }}>{value}</div>
      <div style={{ fontSize: 12, color: INK, marginTop: 2 }}>{label}</div>
      {hint && <div style={{ fontSize: 11, color: "#94a0b5", marginTop: 2 }}>{hint}</div>}
    </div>
  );
}
function KpiCard({ label, main, sub, accent }) {
  return (
    <div style={Object.assign({}, cardStyle, { padding: "14px 16px", borderTop: "3px solid " + accent })}>
      <div style={{ fontSize: 11.5, color: INK, textTransform: "uppercase", letterSpacing: 0.4, fontWeight: 600 }}>{label}</div>
      <div style={{ fontSize: 24, fontWeight: 800, color: accent, margin: "4px 0 1px", fontVariantNumeric: "tabular-nums" }}>{main}</div>
      <div style={{ fontSize: 12, color: INK }}>{sub}</div>
    </div>
  );
}
function CopyBtn({ done, onClick, label }) {
  return <button onClick={onClick} style={primaryBtn}>{done ? "Copié ✓" : (label || "Copier")}</button>;
}

/* ---------- Styles ---------- */
const cardStyle = { border: "1px solid " + LINE, borderRadius: 12, padding: 16, background: "#fff", boxShadow: "0 1px 2px rgba(29,46,77,.04)" };
const taStyle = { width: "100%", minHeight: 190, resize: "vertical", fontFamily: "Menlo, Consolas, monospace", fontSize: 13, lineHeight: 1.5, color: NAVY, border: "1px solid " + LINE, borderRadius: 8, padding: 12, boxSizing: "border-box", background: "#fbfcfe" };
const th = { textAlign: "left", padding: "9px 10px", fontSize: 11.5, fontWeight: 700, color: INK, whiteSpace: "nowrap" };
const td = { padding: "8px 10px", verticalAlign: "middle" };
const primaryBtn = { background: BLUE, color: "#fff", border: "none", borderRadius: 7, padding: "8px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" };
const ghostBtn = { background: "transparent", color: BLUE_DEEP, border: "1px solid " + BLUE, borderRadius: 7, padding: "7px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" };

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
